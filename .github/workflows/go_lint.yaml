name: Lint
on: [push, pull_request]
jobs:
  lint:
    name: lint
    runs-on: buildjet-4vcpu-ubuntu-2204
    steps:
      - uses: buildjet/setup-go@v5
        with:
          go-version: 1.21.5
      - uses: actions/checkout@v6
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
